<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pretext</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <a class="back-link" href="index.html">index</a>
      <h1 id="page-title">page</h1>
      <pre class="page-art">

      </pre>
    </main>
    <script>
      const queryTitle = location.search.replace("?", "");
      const pathTitle = location.pathname.replace("/", "").replace(".html", "");
      const title = queryTitle || pathTitle || "index";
      document.title = `pretext / ${title}`;
      document.getElementById("page-title").textContent = title;
    </script>
  </body>
</html>
