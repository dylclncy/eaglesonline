<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pretext text rendering engine</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage" aria-label="pretext text rendering engine site map">
      <pre class="ascii-layer" aria-hidden="true"></pre>

      <nav class="node-field" aria-label="Site pages">
        <a class="node root" href="contact.html" data-node="contact" data-label="contact" aria-label="contact" style="--x: 25; --y: 38;">
          <pre aria-hidden="true"></pre>
          <span class="node-label" aria-hidden="true">csontact</span>
        </a>

        <a class="node" href="shows.html" data-node="shows" data-label="shows" aria-label="shows" style="--x: 50; --y: 38;">
          <pre aria-hidden="true"></pre>
          <span class="node-label" aria-hidden="true">shows</span>
        </a>

        <a class="node" href="music.html" data-node="music" data-label="music" aria-label="music" style="--x: 75; --y: 38;">
          <pre aria-hidden="true"></pre>
          <span class="node-label" aria-hidden="true">music</span>
        </a>

        <a class="node" href="merchandise.html" data-node="merchandise" data-label="merchandise" aria-label="merchandise" style="--x: 38; --y: 62;">
          <pre aria-hidden="true"></pre>
          <span class="node-label" aria-hidden="true">merchandise</span>
        </a>

        <a class="node" href="gallery.html" data-node="gallery" data-label="gallery" aria-label="gallery" style="--x: 62; --y: 62;">
          <pre aria-hidden="true"></pre>
          <span class="node-label" aria-hidden="true">gallery</span>
        </a>
      </nav>
    </main>

    <script src="pretext.js"></script>
    <script src="ascii-image.js"></script>
    <script src="site.js"></script>
  </body>
</html>
